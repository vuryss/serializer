name: release-please

on:
    push:
        branches:
            - master

permissions:
    contents: read

jobs:
    release-please:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
        steps:
            -   uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
